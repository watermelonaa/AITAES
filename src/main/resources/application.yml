# ===== AITAES 数智化教学分析评价系统 =====
spring:
  application:
    name: AITAES
  datasource:
    url: jdbc:mysql://localhost:3306/aitaes_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ===== MyBatis-Plus 配置 =====
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.aitaes.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== 日志 =====
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [AITAES] %-5level %logger{36} - %msg%n"

# ===== AITAES 业务配置 =====
aitaes:
  import:
    batch-size: 500
    max-errors: 100
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen2.5:7b}
      connect-timeout: ${OLLAMA_CONNECT_TIMEOUT:5s}
      read-timeout: ${OLLAMA_READ_TIMEOUT:120s}
      max-attempts: ${OLLAMA_MAX_ATTEMPTS:3}
      retry-delay: ${OLLAMA_RETRY_DELAY:1s}
      temperature: ${OLLAMA_TEMPERATURE:0.2}
